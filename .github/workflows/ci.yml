name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/paw-inference

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test Go service
        run: go test ./...

      - name: Build OCI image
        run: podman build --format oci -t "$IMAGE_NAME:sha-$GITHUB_SHA" -f Containerfile .

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: echo "$GITHUB_TOKEN" | podman login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push commit image
        if: github.event_name != 'pull_request'
        run: podman push "$IMAGE_NAME:sha-$GITHUB_SHA"

      - name: Push latest image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          podman tag "$IMAGE_NAME:sha-$GITHUB_SHA" "$IMAGE_NAME:latest"
          podman push "$IMAGE_NAME:latest"
